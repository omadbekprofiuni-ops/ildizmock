<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/ildizmock-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILDIZmock</title>
    <style>
      /* Minimal first-paint splash — barely visible, hidden by main.tsx
         once React mounts. Bosh diqqat hero matn animatsiyasiga. */
      #brand-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 0.3s ease;
      }
      #brand-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #brand-splash__logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        mix-blend-mode: multiply;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="brand-splash" aria-hidden="true">
      <img id="brand-splash__logo" src="/ildizmock-logo.png" alt="ILDIZmock" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
