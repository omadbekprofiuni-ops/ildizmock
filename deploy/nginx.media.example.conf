# HOTFIX — Nginx /media/ konfiguratsiyasi audio playback uchun
#
# Bu fayl FAQAT example sifatida — server'dagi haqiqiy nginx config'iga
# (`/etc/nginx/sites-enabled/ildiz-testing.uz`) qo'lda ko'chirib qo'shing
# (location /media/ blokini almashtiring).
#
# Sabab: nginx default `application/octet-stream` MIME type bilan audio
# faylni qaytaradi, browser uni o'ynay olmaydi ('Audio could not be
# played'). Bu konfiguratsiya:
#   1. Audio MIME types'ni aniq belgilaydi (.mp3 → audio/mpeg, va h.k.)
#   2. CORS header'lar qo'shadi (ehtimoliy cross-origin holatlar uchun)
#   3. Range request'larni qo'llaydi (audio scrubbing / seeking)
#   4. 30 kunlik cache (immutable — fayl nomlari hash'li)

location /media/ {
    alias /home/ildiz/ildizmock/backend/media/;

    # Cache headers
    expires 30d;
    add_header Cache-Control "public, immutable" always;

    # CORS — cross-origin audio (CDN'dan yoki boshqa subdomain'dan
    # ishlatilishi mumkin)
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

    # MIME type mapping — audio formatlari uchun aniq belgilangan
    types {
        audio/mpeg     mp3;
        audio/mp4      m4a mp4;
        audio/x-m4a    m4a;
        audio/ogg      ogg oga;
        audio/wav      wav;
        audio/webm     webm weba;
        application/pdf pdf;
        image/png      png;
        image/jpeg     jpg jpeg;
        image/webp     webp;
        image/svg+xml  svg;
    }

    # Range request support (audio seeking uchun zarur)
    sendfile on;
    tcp_nopush on;

    # Uzun yuklash uchun timeout'lar
    proxy_read_timeout 300s;
    send_timeout 300s;
}

# Server'da qo'llash:
#   sudo cp /etc/nginx/sites-enabled/ildiz-testing.uz \
#           /etc/nginx/sites-enabled/ildiz-testing.uz.bak
#   sudo nano /etc/nginx/sites-enabled/ildiz-testing.uz
#   # location /media/ blokini yuqoridagi blok bilan almashtiring
#   sudo nginx -t                # syntax tekshiruv
#   sudo systemctl reload nginx
#
# Smoke test (audio MIME va CORS to'g'ri ekanini tekshirish):
#   curl -I https://ildiz-testing.uz/media/audio/2026/05/<filename>.mp3
# Kutilgan natija:
#   HTTP/2 200
#   content-type: audio/mpeg
#   access-control-allow-origin: *
#   cache-control: public, immutable
